services:
  direcontrol:
    image: roushtech/direcontrol:${VERSION:-stable}
    env_file: .env
    ports:
      - "${HTTP_PORT:-80}:5010"
    volumes:
      - ./data:/data
    restart: unless-stopped
    # Allows the container to reach Direwolf running on the host via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
